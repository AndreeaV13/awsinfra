AWSTemplateFormatVersion: '2010-09-09'
Description: Server EC2 cu security group

Parameters:
  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64

  GeminiApiKey:
    Type: String
    NoEcho: true
    Description: Cheia API Gemini

Resources:
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH and ICMP
      VpcId: !ImportValue network-vpc-id
      SecurityGroupIngress:
        - IpProtocol: icmp
          FromPort: -1
          ToPort: -1
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 5.12.234.139/32
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 81.196.21.110/32
        - IpProtocol: tcp
          FromPort: 5000
          ToPort: 5000
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  WebServerInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: !Ref LatestAmiId
      KeyName: "frankfurt"
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          yum install nginx python3 python3-pip git -y
          pip3 install flask google-generativeai boto3
          git clone https://github.com/AndreeaV13/awsinfra.git /var/www/app
          cd /var/www/app
          export GEMINI_API_KEY="${GeminiApiKey}"
          nohup python3 app.py > /var/log/flask.log 2>&1 &
          systemctl start nginx
          systemctl enable nginx
      Tags:
        - Key: Name
          Value: first-ec2-instance
      NetworkInterfaces:
        - AssociatePublicIpAddress: "true"
          DeviceIndex: "0"
          GroupSet:
            - !Ref InstanceSecurityGroup
          SubnetId: !ImportValue network-subnet3-id

Outputs:
  InstanceId:
    Value: !Ref WebServerInstance
  PublicIP:
    Value: !GetAtt WebServerInstance.PublicIp
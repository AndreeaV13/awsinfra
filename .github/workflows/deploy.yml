name: Deploy site

on:
  push:
    branches: [master]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-central-1
  PROJECT_NAME: primul-meu-site
  BUCKET_NAME: primul-meu-site-616077259946-eu-central-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::616077259946:role/github-actions-awsinfra-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Determine environment tag
        id: envtag
        run: |
          if [ "${{ github.ref_name }}" = "master" ]; then
            echo "environment=production" >> "$GITHUB_OUTPUT"
          else
            echo "environment=staging" >> "$GITHUB_OUTPUT"
          fi

      # STACK 1: Reteaua (VPC, subnet-uri, gateway, rutare)
      - name: Deploy network stack
        run: |
          aws cloudformation deploy \
            --template-file infra/network.yaml \
            --stack-name network-stack \
            --tags Environment=${{ steps.envtag.outputs.environment }} Owner=${{ github.actor }} \
            --region ${{ env.AWS_REGION }}

      # STACK 2: Serverul (security group, EC2)
      - name: Deploy compute stack
        run: |
          aws cloudformation deploy \
            --template-file infra/compute.yaml \
            --stack-name compute-stack \
            --tags Environment=${{ steps.envtag.outputs.environment }} Owner=${{ github.actor }} \
            --region ${{ env.AWS_REGION }}

      # STACK 3: Site-ul static (S3, CloudFront)
      - name: Deploy site stack
        run: |
          aws cloudformation deploy \
            --template-file infra/site.yaml \
            --stack-name site-stack \
            --parameter-overrides ProjectName=${{ env.PROJECT_NAME }} \
            --tags Environment=${{ steps.envtag.outputs.environment }} Owner=${{ github.actor }} \
            --region ${{ env.AWS_REGION }}

      # Sincronizeaza fisierele site-ului
      - name: Sync site files to S3
        run: |
          aws s3 sync site/ s3://${{ env.BUCKET_NAME }}/ --delete --region ${{ env.AWS_REGION }}

      # Goleste cache-ul CloudFront
      - name: Invalidate CloudFront cache
        run: |
          DISTRIBUTION_ID=$(aws cloudformation describe-stacks \
            --stack-name site-stack \
            --region ${{ env.AWS_REGION }} \
            --query "Stacks[0].Outputs[?OutputKey=='DistributionId'].OutputValue" \
            --output text)
          aws cloudfront create-invalidation \
            --distribution-id "$DISTRIBUTION_ID" \
            --paths "/*"
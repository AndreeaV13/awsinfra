name: Deploy site

on:
  push:
    branches: [master]

permissions:
  id-token: write   # necesar pentru OIDC (fara chei permanente)
  contents: read

env:
  AWS_REGION: eu-central-1
  STACK_NAME: primul-meu-site
  BUCKET_NAME: primul-meu-site-616077259946-eu-central-1
  PROJECT_NAME: primul-meu-site

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::616077259946:role/github-actions-awsinfra-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Determine environment tag from branch
        id: envtag
        run: |
          if [ "${{ github.ref_name }}" = "master" ]; then
            echo "environment=production" >> "$GITHUB_OUTPUT"
          else
            echo "environment=staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file infra/template.yaml \
            --stack-name ${{ env.STACK_NAME }} \
            --parameter-overrides ProjectName=${{ env.PROJECT_NAME }} \
            --tags Project=${{ env.PROJECT_NAME }} Environment=${{ steps.envtag.outputs.environment }} Owner=${{ github.actor }} ManagedBy=CloudFormation \
            --region ${{ env.AWS_REGION }}

      - name: Sync site files to S3
        run: |
          aws s3 sync site/ s3://${{ env.BUCKET_NAME }}/ --delete --region ${{ env.AWS_REGION }}

      - name: Invalidate CloudFront cache
        run: |
          DISTRIBUTION_ID=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --query "Stacks[0].Outputs[?OutputKey=='DistributionId'].OutputValue" \
            --output text)
          aws cloudfront create-invalidation \
            --distribution-id "$DISTRIBUTION_ID" \
            --paths "/*"
